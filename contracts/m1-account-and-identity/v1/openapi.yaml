openapi: 3.1.0
info:
  title: XMCL M1 account and identity API
  version: 1.0.0
  description: XMCL account, identity, session, OAuth, merge, and deletion API.
paths:
  /v1/auth/{provider}/authorize:
    get:
      operationId: beginOAuthAuthorization
      parameters:
        - $ref: "#/components/parameters/Provider"
        - $ref: "#/components/parameters/RedirectUri"
        - $ref: "#/components/parameters/OAuthState"
        - $ref: "#/components/parameters/CodeChallenge"
      responses:
        "200":
          description: One-time PKCE authorization transaction.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthAuthorization" }
        "422": { $ref: "#/components/responses/ApiError" }
        "503": { $ref: "#/components/responses/ApiError" }
  /v1/auth/{provider}/exchange:
    post:
      operationId: exchangeOAuthAuthorization
      parameters:
        - $ref: "#/components/parameters/Provider"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OAuthExchangeRequest" }
      responses:
        "200":
          description: Created or restored account and new session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountSessionResponse" }
        "409": { $ref: "#/components/responses/ApiError" }
        "410": { $ref: "#/components/responses/ApiError" }
        "422": { $ref: "#/components/responses/ApiError" }
        "502": { $ref: "#/components/responses/ApiError" }
        "503": { $ref: "#/components/responses/ApiError" }
  /v1/auth/{provider}/launcher-exchange:
    post:
      operationId: exchangeLauncherProviderLogin
      description: Optional XMCL bearer session links a freshly completed provider login.
      parameters:
        - $ref: "#/components/parameters/Provider"
      security:
        - {}
        - xmclSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LauncherExchangeRequest" }
      responses:
        "200":
          description: Created, restored, or linked session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountSessionResponse" }
        "409": { $ref: "#/components/responses/ApiError" }
        "422": { $ref: "#/components/responses/ApiError" }
        "503": { $ref: "#/components/responses/ApiError" }
  /v1/account:
    get:
      operationId: getAccount
      security: [{ xmclSession: [account:read] }]
      responses:
        "200":
          description: Current account.
          content:
            application/json:
              schema: { $ref: "./account.schema.json" }
        "401": { $ref: "#/components/responses/ApiError" }
  /v1/account/identities:
    get:
      operationId: listAccountIdentities
      security: [{ xmclSession: [account:read] }]
      responses:
        "200":
          description: Public linked identities without subjects.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "./identity.schema.json" }
        "401": { $ref: "#/components/responses/ApiError" }
  /v1/account/identities/{provider}/authorize:
    post:
      operationId: beginIdentityLink
      security: [{ xmclSession: [account:write] }]
      parameters:
        - $ref: "#/components/parameters/Provider"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LinkAuthorizationRequest" }
      responses:
        "200":
          description: One-time PKCE link transaction.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthAuthorization" }
        "401": { $ref: "#/components/responses/ApiError" }
        "403": { $ref: "#/components/responses/ApiError" }
        "422": { $ref: "#/components/responses/ApiError" }
  /v1/account/identities/{provider}/complete:
    post:
      operationId: completeIdentityLink
      security: [{ xmclSession: [account:write] }]
      parameters:
        - $ref: "#/components/parameters/Provider"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OAuthExchangeRequest" }
      responses:
        "200":
          description: Linked public identity.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [identity, bindingDisposition]
                properties:
                  identity: { $ref: "./identity.schema.json" }
                  bindingDisposition: { const: linked }
        "401": { $ref: "#/components/responses/ApiError" }
        "403": { $ref: "#/components/responses/ApiError" }
        "409": { $ref: "#/components/responses/ApiError" }
  /v1/account/identities/{provider}:
    delete:
      operationId: unlinkIdentity
      security: [{ xmclSession: [account:write] }]
      parameters:
        - $ref: "#/components/parameters/Provider"
      responses:
        "204": { description: Identity unlinked. }
        "401": { $ref: "#/components/responses/ApiError" }
        "403": { $ref: "#/components/responses/ApiError" }
        "409":
          description: The final identity cannot be unlinked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /v1/account/merge/prepare:
    post:
      operationId: prepareAccountMerge
      security: [{ xmclSession: [account:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: {
              $ref: "#/components/schemas/MergeReauthenticationRequest",
            }
      responses:
        "200":
          description: Explicitly reauthenticated merge preview.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MergePreview" }
        "401": { $ref: "#/components/responses/ApiError" }
        "403": { $ref: "#/components/responses/ApiError" }
        "404": { $ref: "#/components/responses/ApiError" }
        "409": { $ref: "#/components/responses/ApiError" }
        "422": { $ref: "#/components/responses/ApiError" }
  /v1/account/merge/confirm:
    post:
      operationId: confirmAccountMerge
      security: [{ xmclSession: [account:write] }]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [mergeId, confirmed]
              properties:
                mergeId: { type: string, minLength: 1 }
                confirmed: { const: true }
      responses:
        "202":
          description: Idempotent merge task.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncTask" }
        "409": { $ref: "#/components/responses/ApiError" }
        "410": { $ref: "#/components/responses/ApiError" }
        "422": { $ref: "#/components/responses/ApiError" }
  /v1/sessions/refresh:
    post:
      operationId: refreshXmclSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [sessionId, refreshToken]
              properties:
                sessionId: { type: string, minLength: 1 }
                refreshToken: { type: string, minLength: 1 }
      responses:
        "200":
          description: Rotated session credential pair.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [session]
                properties:
                  session: { $ref: "./session.schema.json" }
        "401": { $ref: "#/components/responses/ApiError" }
  /v1/sessions/revoke:
    post:
      operationId: revokeXmclSession
      security: [{ xmclSession: [session:manage] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                sessionId: { type: string, minLength: 1 }
                all: { type: boolean }
      responses:
        "204": { description: Session or session family revoked. }
        "401": { $ref: "#/components/responses/ApiError" }
        "403": { $ref: "#/components/responses/ApiError" }
  /v1/account/deletion:
    post:
      operationId: requestAccountDeletion
      security: [{ xmclSession: [account:write] }]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "202":
          description: Cancellable deletion task.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncTask" }
        "401": { $ref: "#/components/responses/ApiError" }
        "403": { $ref: "#/components/responses/ApiError" }
        "409": { $ref: "#/components/responses/ApiError" }
  /v1/account/deletion/cancel:
    post:
      operationId: cancelAccountDeletion
      security: [{ xmclSession: [account:write] }]
      responses:
        "204": { description: Pending deletion cancelled. }
        "401": { $ref: "#/components/responses/ApiError" }
        "403": { $ref: "#/components/responses/ApiError" }
        "409": { $ref: "#/components/responses/ApiError" }
        "410": { $ref: "#/components/responses/ApiError" }
components:
  securitySchemes:
    xmclSession:
      type: http
      scheme: bearer
      bearerFormat: XMCL session
  parameters:
    Provider:
      name: provider
      in: path
      required: true
      schema: { enum: [microsoft, modrinth, google, discord] }
    RedirectUri:
      name: redirectUri
      in: query
      required: true
      schema: { type: string, format: uri }
    OAuthState:
      name: state
      in: query
      required: true
      schema: { type: string, minLength: 1 }
    CodeChallenge:
      name: codeChallenge
      in: query
      required: true
      schema: { type: string, minLength: 1 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 255 }
  responses:
    ApiError:
      description: Stable M1 error response.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
  schemas:
    ApiError:
      type: object
      additionalProperties: false
      required: [error, message, requestId]
      properties:
        error: { type: string }
        message: { type: string }
        requestId: { type: string }
        details: {}
    OAuthAuthorization:
      type: object
      additionalProperties: false
      required: [transactionId, authorizationUrl, expiresAt]
      properties:
        transactionId: { type: string }
        authorizationUrl: { type: string, format: uri }
        expiresAt: { type: string, format: date-time }
    OAuthExchangeRequest:
      type: object
      additionalProperties: false
      required: [transactionId, state, codeVerifier, code]
      properties:
        transactionId: { type: string, minLength: 1 }
        state: { type: string, minLength: 1 }
        codeVerifier: { type: string, minLength: 1 }
        code: { type: string, minLength: 1 }
    LauncherExchangeRequest:
      type: object
      additionalProperties: false
      required: [loginTransactionId, completedAt, credential]
      properties:
        loginTransactionId: { type: string, minLength: 1 }
        completedAt: { type: string, format: date-time }
        credential: { type: string, minLength: 1, writeOnly: true }
    LinkAuthorizationRequest:
      type: object
      additionalProperties: false
      required: [redirectUri, state, codeChallenge]
      properties:
        redirectUri: { type: string, format: uri }
        state: { type: string, minLength: 1 }
        codeChallenge: { type: string, minLength: 1 }
    AccountSessionResponse:
      type: object
      additionalProperties: false
      required: [account, session, bindingDisposition]
      properties:
        account: { $ref: "./account.schema.json" }
        session: { $ref: "./session.schema.json" }
        bindingDisposition: { enum: [created, restored, linked] }
    MergeReauthenticationRequest:
      type: object
      additionalProperties: false
      required: [provider, credential, completedAt]
      properties:
        provider: { enum: [microsoft, modrinth, google, discord] }
        credential: { type: string, minLength: 1, writeOnly: true }
        completedAt: { type: string, format: date-time }
    MergePreview:
      type: object
      additionalProperties: false
      required: [
        mergeId,
        expiresAt,
        destinationAccountId,
        sourceSummary,
        resourceSummary,
      ]
      properties:
        mergeId: { type: string }
        expiresAt: { type: string, format: date-time }
        destinationAccountId: { type: string }
        sourceSummary: { type: object }
        resourceSummary: { type: object }
    AsyncTask:
      type: object
      additionalProperties: false
      required: [taskId, requestId, status, resource, createdAt, updatedAt]
      properties:
        taskId: { type: string }
        requestId: { type: string }
        status: { enum: [queued, running, succeeded, failed, cancelled] }
        resource:
          type: object
          additionalProperties: false
          required: [type, id]
          properties:
            type: { type: string }
            id: { type: string }
        result: {}
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
