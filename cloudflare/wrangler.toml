name = "xmcl-web-api"
main = "worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Runtime configuration is set as Worker secrets. This prevents checked-in
# defaults from overriding values supplied by deployment automation.

# Durable Object backing /group/:id realtime rooms (replaces BroadcastChannel).
[[durable_objects.bindings]]
name = "GROUP_ROOM"
class_name = "GroupRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GroupRoom"]

[triggers]
crons = ["0 0 * * *"]
